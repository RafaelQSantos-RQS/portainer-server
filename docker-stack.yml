networks:
  swarm-net:
    name: swarm-net
    external: true
  agent_network:
    name: portainer_server_agent_network
    driver: overlay
    attachable: true
    ipam:
      driver: default
      config:
        - subnet: 100.80.0.0/24

volumes:
  server-data:
    name: portainer_server_swarm_data

services:
  agent:
    image: portainer/agent:${PORTAINER_AGENT_VERSION:-lts}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  server:
    image: portainer/portainer-ce:${PORTAINER_COMMUNITY_VERSION:-lts}
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    networks:
      - swarm-net
      - agent_network
    environment:
      - SERVER_DATA_VOLUME_NAME=${SERVER_DATA_VOLUME_NAME:-portainer_server_swarm_data}
      - DOMAIN=${DOMAIN:-portainer.example}
    volumes:
      - server-data:/data
    deploy:
      endpoint_mode: vip
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.5
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=swarm-net"
        - "traefik.http.routers.portainer-server.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.portainer-server.entrypoints=websecure"
        - "traefik.http.routers.portainer-server.service=portainer-server"
        - "traefik.http.routers.portainer-server.tls=true"
        - "traefik.http.services.portainer-server.loadbalancer.server.port=9000"
        - "traefik.http.services.portainer-server.loadbalancer.server.scheme=http"
